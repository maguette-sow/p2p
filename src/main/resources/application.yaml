spring:
  application:
    name: p2p-node
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 5000

node:
  storage: storage_node_5000
  peers:
    - http://localhost:5001
    - http://localhost:5002



